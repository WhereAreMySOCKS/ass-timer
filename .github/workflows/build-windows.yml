name: Build Windows (Flutter Client)

on:
  push:
    branches: [main]
    paths:
      - "flutter_client/**"
  pull_request:
    branches: [main]
    paths:
      - "flutter_client/**"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: flutter_client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows support
        run: flutter config --enable-windows-desktop

      - name: Build and package Windows release
        shell: pwsh
        run: .\tool\build_windows_release.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ass-Timer-Windows-x64
          path: flutter_client/releases/Ass-Timer-Windows-x64.zip
          if-no-files-found: error
